services:
  # Base de données PostgreSQL pour Odoo
  db:
    image: postgres:15
    container_name: odoo_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo_pg_data:/var/lib/postgresql/data

  # Backend Odoo 19
  web:
    image: odoo:19.0
    container_name: odoo_web
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./addons_custom:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    command: odoo -d it_support -u pfe_it_support
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo

  # API d'Intelligence Artificielle (FastAPI)
  ia_api:
    build:
      context: ./ia_service
      dockerfile: Dockerfile
    container_name: ia_service
    ports:
      - "8000:8000"
    volumes:
      - ./ia_service:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - web
    env_file:
      - .env

  # Frontend Web (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: next_frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - ia_api

volumes:
  odoo_pg_data:
  odoo_data: